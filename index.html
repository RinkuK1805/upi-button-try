<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Payment Page</title>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h2 {
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* The Button Styling */
        .pay-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background-color: #1b68ff;
            /* UPI Blue */
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pay-btn:hover {
            background-color: #004ccb;
            transform: translateY(-2px);
        }

        .pay-btn img {
            height: 24px;
            filter: brightness(0) invert(1);
        }

        /* QR Code Container */
        #qrcode {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            padding: 15px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .qr-label {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Make a Payment</h2>
        <p>Using UPI ID: 7709512445.eazypay@icici</p>

        <!-- btton by gemine -->
        <!-- Style the link directly so it's valid HTML -->
        <a id="upiLink" href="upi://pay?pa=7709512445.eazypay@icici&pn=Payee&cu=INR"
            style="display: inline-block; padding: 12px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-family: sans-serif;">
            Pay via UPI
        </a>



        <!-- The Payment Button -->
        <a href="upi://pay?pa=7709512445.eazypay@icici&pn=Payee&cu=INR">
            <button
                style="padding: 12px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer;">
                Pay via UPI
            </button>
        </a>


        <a href="upi://pay?pa=7709512445.eazypay@icici&pn=Test&cu=INR">
  Pay Now
</a>


<a href="upi://pay?pa=abc@upi&pn=John%20Doe&am=100&cu=INR&tn=Payment">
  <button>Pay Now</button>
</a>
        <div class="qr-label">OR Scan QR Code</div>

        <!-- QR Code Container -->
        <div id="qrcode"></div>
    </div>

    <a href="upi://pay?pa=7709512445.eazypay@icici&pn=ICICI%20Eazypay&cu=INR">
  <button style="padding:10px 20px; font-size:16px; cursor:pointer;">
    Pay via UPI
  </button>
</a>

    <script>
        const upiId = "7709512445.eazypay@icici";
        const payeeName = "Recipient Name"; // Change this to your actual Name
        const upiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&cu=INR`;

        // 1. Logic for the Button click
        function openUPI() {
            // Standard UPI URI
            window.location.href = upiUrl;

            // Fallback for some Android Chrome versions
            setTimeout(() => {
                if (document.hasFocus()) {
                    console.log("If the app didn't open, please scan the QR code below.");
                }
            }, 1000);
        }

        // 2. Automatically generate the QR code
        new QRCode(document.getElementById("qrcode"), {
            text: upiUrl,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });

        // This helps 'force' the browser to recognize the UPI intent
        document.getElementById('upiLink').addEventListener('click', function (e) {
            // If on Android Chrome, this helps trigger the app selector
            window.location.href = this.href;
        });
    </script>



</body>

</html>
